            border: 1px solid rgba(100, 150, 255, 0.3);
            color: white;
            min-width: 280px;
            font-size: 12px;
        }

        .enhancement-controls h4 {

            padding-bottom: 8px;

        }

        .enhancement-controls .control-group {

        .enhancement-controls label {

    <script>
        var params = {
            // 本地开发：空字符串 + data.js 中 ./public/data/... 由 webpack-dev-server contentBase 提供；远程资源可改为 http://host:port/
            resourceProUrl: '',
            deviceType: 1,
            deviceName: '1主变',
            statusColor: {
                // SELECTED: [0, 0, 0, 255],
                SERIOUS: [251, 75, 28, 255],
                ALARM: [255, 227, 61, 255],
                WARNING: [81, 247, 187, 255],
            },
            category: 1,//模型类型  1 设备模型   2 传感器模型
            //isContinuousClick: false,//设备模型是否支持连续点击选中功能：false不支持，true支持。默认false。
            resolutionScale: 1.0,//0.9,//默认是1.0
        };
        let toolBar = {
            initpos: {
                display: true,
                title: 'init position',
            },
            rotate: {
                display: true, //是否显示旋转按钮
                direction: 'left', //旋转方向
                attribute: [{ title: 'rotate' }, { title: 'stopRotate' }],
            },
            popup: {
                display: true, //是否显示气泡显示按钮
                default: false, //默认显示状态
                style: "top:30px;left:-20px",
                title: 'POPUP',
            },
            upload: {
                display: false, //是否显示上传按钮
                click: this.uploadClick,
            },
            edit: {
                display: false, //是否显示编辑按钮
                click: this.editClick,
                title: 'edit',
            }
        };


        var viewer0, detectViewer0, show0, edit0, enhancements;
        //调用本地测试代码开关
        window.switchLocalTest = true;
        window.onload = function () {
            show3d(0);
            // edit3d();
            // monitorView3d();
            // detectView3d();
            // let time0 = window.setTimeout("edit3d()", 2000)
            // let time1 = window.setTimeout("monitorView3d()", 4000)
            // let time2 = window.setTimeout("detectView3d()", 8000)
        }

        // 增强功能初始化
        function initEnhancements() {
            if (show0 && show0.viewer && !enhancements) {
                enhancements = pd3d.createEnhancements(show0.viewer);
                console.log('Enhancements initialized:', enhancements);
                
                // 添加底部快捷工具栏
                const container = document.getElementById('show3dContainer');
                pd3d.createDemoToolbar(container, enhancements);
            }
        }

        // 应用视角预设
        function applyViewPreset() {
            const select = document.getElementById('viewPresetSelect');
            const value = select.value;
            if (value && enhancements) {
                const [scene, preset] = value.split('.');
                enhancements.applyViewPreset(scene, preset);
            } else if (!enhancements) {
                alert('请先等待增强功能初始化完成');
            }
        }

        // 应用高亮效果
        function applyHighlight() {
            if (!enhancements) {
                initEnhancements();
                setTimeout(() => applyHighlight(), 500);
                return;
            }
            
            const select = document.getElementById('highlightType');
            const type = select.value;
            
            // 获取模型
            const viewer = show0.viewer;
            const primitives = viewer.scene.primitives;
            let modelFound = false;
            
            // 遍历primitives查找模型
            for (let i = 0; i < primitives.length; i++) {
                const primitive = primitives.get(i);
                if (primitive && primitive._categories && primitive._categories.length > 0) {
                    // 这是一个模型
                    enhancements.material.highlightModel(primitive, type);
                    modelFound = true;
                    console.log('Highlight applied to model:', primitive);
                }
            }
            
            if (!modelFound) {
                // 尝试从entities获取模型
                const entities = viewer.entities.values;
                for (let i = 0; i < entities.length; i++) {
                    const entity = entities[i];
                    if (entity.model) {
                        enhancements.material.highlightModel(entity, type);
                        modelFound = true;
                        break;
                    }
                }
            }
            
            if (!modelFound) {
                alert('未找到可高亮的模型');
            }
        }

        // 清除高亮
        function clearHighlights() {
            if (enhancements) {
                enhancements.material.clearAllHighlights();
            }
        }

        // 切换场景模式
        function changeSceneMode() {
            if (!enhancements) {
                initEnhancements();
                setTimeout(() => changeSceneMode(), 500);
                return;
            }
            
            const select = document.getElementById('sceneMode');
            const mode = select.value;
            enhancements.setSceneMode(mode);
        }

        // 切换增强控制面板显示
        function toggleEnhancementPanel() {
            if (!enhancements) {
                initEnhancements();
                setTimeout(() => toggleEnhancementPanel(), 500);
                return;
            }
            
            const panel = enhancements._controlPanel;
            if (panel && panel.panelElement) {
                const isVisible = panel.panelElement.style.display !== 'none';
                if (isVisible) {
                    panel.hide();
                } else {
                    panel.show();
                }
            } else {
                enhancements.showControlPanel();
            }
        }

        // 切换性能模式
        function togglePerformanceMode() {
            if (!enhancements) {
                initEnhancements();
                setTimeout(() => togglePerformanceMode(), 500);
                return;
            }
            enhancements.applyPerformanceMode();
        }

        // 切换画质模式
        function toggleQualityMode() {
            if (!enhancements) {
                initEnhancements();
                setTimeout(() => toggleQualityMode(), 500);
                return;
            }
            enhancements.applyQualityMode();
        }

        //monitorView3d

            // pd3d.refreshStatus(view3d.dataStatusUpdate, deviceObj.sensorList, lastData, 1);
            // pd3d.refreshLatestData(view3d.dataStatusUpdate, lastData);

            // window.setTimeout(() => {

            // }, 10000)
        }

        //带电检测设备监视

                    ...toolBar,
                    popup: {

                    },
                    upload: {
                        display: false,
                    },
                    edit: {
                        display: false,
                    }
                },
            };
            //设备展示页面--带电检测
            detectViewer0 = pd3d.view3d('detectView3dContainer', optsDetectView3d, detectViewer0, 'detect');

            window.addEventListener('message', (e) => {

                    console.log('phaseNames111222111：：：' + e.data.phaseNames)

            }, false)
        }


        //模型展示--设备模型、传感器模型
        function show3d(index) {
            if (index == 2 || index == 3 || index == 4) {

            show0 = pd3d.show3d('show3dContainer', optsShow3d, show0);
            
            // 模型加载后初始化增强功能（诊断模式：暂时禁用以验证是否是增强模块导致问题）

        //模型编辑

            let optsEdit3d = {

            //编辑页面

        }

        function allIn() {
            var el = document.getElementById('allInDom')
