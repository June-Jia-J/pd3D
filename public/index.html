    <script>

        //模型展示--设备模型、传感器模型
        function show3d(index) {
            if (index == 2 || index == 3 || index == 4) {
                params.category = 2
            } else {
                params.category = 1
            }
            let optsShow3d = {
                dataRes: deviceObjList[index],// show3dResult,//sensorObj,//
                params,
            };
            show0 = pd3d.show3d('show3dContainer', optsShow3d, show0);
        }

        //模型编辑
        function edit3d() {
            let optsEdit3d = {
                dataRes: deviceObj,
                params,
                toolBar: {
                    operaDes: {
                        title: 'operaDes',
                        content: {
                            text: '操作说明',
                            direction: '方向'
                        }
                    }
                }
            };
            //编辑页面
            edit0 = pd3d.edit3d('edit3dContainer', optsEdit3d, edit0);
            pd3d.updateToolBarStyle("right: 1rem;", 'edit3dContainer');
        }

        function updateIsContinuousClick() {
            var el = document.getElementById('updateIsContinuousDom')
            console.log(el.checked)

            pd3d.updateIsContinuousClick(detectViewer0, el.checked)
        }

        function allIn() {
            var el = document.getElementById('allInDom')
            console.log(el.checked)
            if (el.checked) {
                pd3d.updateEntityByPhase(detectViewer0, ['ABC'], true)//全选['A', 'B', 'C', 'noPhase']
            } else {
                pd3d.updateEntityByPhase(detectViewer0, [], false)// 取消全选
            }
        }

        var enhancementPanel = null;
        
        function toggleEnhancementPanel() {
            var btn = document.getElementById('toggleEnhancementPanel');
            if (!enhancementPanel) {
                enhancementPanel = new pd3d.EnhancementPanel(show0);
                enhancementPanel.appendTo('show3dContainer');
                btn.classList.add('active');
                btn.textContent = '关闭面板';
            } else {
                enhancementPanel.toggle();
                if (enhancementPanel.panelEl.style.display === 'none') {
                    btn.classList.remove('active');
                    btn.textContent = '增强功能面板';
                } else {
                    btn.classList.add('active');
                    btn.textContent = '关闭面板';
                }
            }
        }
        
        function demoCameraFeatures() {
            var cameraManager = show0.getCameraManager();
            if (!cameraManager) {
                alert('请先加载模型');
                return;
            }
            
            var presets = ['patrol', 'detail', 'top', 'front'];
            var index = 0;
            
            function flyToNext() {
                if (index < presets.length) {
                    cameraManager.flyToBookmark(presets[index]);
                    index++;
                    setTimeout(flyToNext, 2000);
                }
            }
            
            flyToNext();
        }
        
        function demoLightFeatures() {
            var lightManager = show0.getLightManager();
            if (!lightManager) {
                alert('请先加载模型');
                return;
            }
            
            var presets = ['day', 'evening', 'night', 'indoor', 'inspection'];
            var index = 0;
            
            function applyNext() {
                if (index < presets.length) {
                    lightManager.applyPreset(presets[index]);
                    console.log('应用光照预设: ' + presets[index]);
                    index++;
                    setTimeout(applyNext, 2000);
                }
            }
            
            applyNext();
        }
